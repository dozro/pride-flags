<svg version="1.1"
    width="250" height="250"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>trans color gradient with gaussian blur</title>
    <defs>
        <linearGradient id="TransGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="DeepSkyBlue" />
            <stop offset="25%" stop-color="HotPink" />
            <stop offset="50%" stop-color="White" />
            <stop offset="75%" stop-color="HotPink" />
            <stop offset="100%" stop-color="DeepSkyBlue" />
        </linearGradient>
    </defs>
    <filter id="pixelate" x="0%" y="0%" width="100%" height="100%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
        <feGaussianBlur stdDeviation="2" in="SourceGraphic" result="smoothed" />
        <feImage width="15" height="15"
            xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAIAAAACDbGyAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAWSURBVAgdY1ywgOEDAwKxgJhIgFQ+AP/vCNK2s+8LAAAAAElFTkSuQmCC"
            result="displacement-map" />
        <feTile in="displacement-map" result="pixelate-map" />
        <feDisplacementMap in="smoothed" in2="pixelate-map" xChannelSelector="R"
            yChannelSelector="G" scale="50" result="pre-final" />
        <feComposite operator="in" in2="SourceGraphic" />
    </filter>
    <rect
        x="0"
        y="0"
        width="100%"
        height="100%"
        fill="url(#TransGradient)"
        filter="url(#pixelate)"
    />
</svg>