<svg version="1.1"
    width="2400" height="2400"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>trans color gradient with gaussian blur</title>
    <defs>
        <linearGradient id="TransGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="DeepSkyBlue" />
            <stop offset="25%" stop-color="HotPink" />
            <stop offset="50%" stop-color="White" />
            <stop offset="75%" stop-color="HotPink" />
            <stop offset="100%" stop-color="DeepSkyBlue" />
        </linearGradient>
        <radialGradient id="FocusVignette" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="black" stop-opacity="0" />
            <stop offset="70%" stop-color="black" stop-opacity="0" />
            <stop offset="100%" stop-color="black" stop-opacity="0.45" />
        </radialGradient>
        <filter id="blurMe">
            <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
        </filter>
        <filter id="pixelate">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="smoothed" />
            <feImage width="10" height="10"
                xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAIAAAACDbGyAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAWSURBVAgdY1ywgOEDAwKxgJhIgFQ+AP/vCNK2s+8LAAAAAElFTkSuQmCC"
                result="map" />
            <feTile in="map" result="tile" />
            <feDisplacementMap in="smoothed" in2="tile" scale="30" />
        </filter>
        <radialGradient id="AvatarGlow" cx="50%" cy="50%" r="30%">
            <stop offset="0%" stop-color="white" stop-opacity="0.25" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </radialGradient>
    </defs>
    <rect
        x="0"
        y="0"
        width="100%"
        height="100%"
        fill="url(#TransGradient)"
        filter="url(#blurMe)"
    />
    <rect
        x="0"
        y="0"
        width="100%"
        height="100%"
        filter="url(#pixelate)"
        opacity="0.15"
    />
    <rect
        x="0"
        y="0"
        width="100%"
        height="100%"
        fill="url(#FocusVignette)"
        opacity="0.9"
    />


    <rect width="100%" height="100%" fill="url(#AvatarGlow)" />
</svg>