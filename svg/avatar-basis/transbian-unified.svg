<svg version="1.1"
    width="300" height="300"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>unified transbian flag</title>
    <defs>
        <linearGradient id="blend" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="DeepSkyBlue" />
            <stop offset="50%" stop-color="White" />
            <stop offset="100%" stop-color="HotPink" />
        </linearGradient>
        <linearGradient id="unifiedTransbianGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="DeepSkyBlue" />
            <stop offset="20%" stop-color="HotPink" />
            <stop offset="40%" stop-color="#FF9A56" />
            <stop offset="60%" stop-color="White" />
            <stop offset="80%" stop-color="PaleVioletRed" />
            <stop offset="100%" stop-color="MediumVioletRed" />
        </linearGradient>
        <radialGradient id="FocusVignette" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="black" stop-opacity="0" />
            <stop offset="70%" stop-color="black" stop-opacity="0" />
            <stop offset="100%" stop-color="black" stop-opacity="0.45" />
        </radialGradient>
        <radialGradient id="AvatarGlow" cx="50%" cy="50%" r="30%">
            <stop offset="0%" stop-color="white" stop-opacity="0.25" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </radialGradient>
    </defs>
    <rect
        x="-4%"
        y="-4%"
        width="104%"
        height="104%"
        fill="url(#unifiedTransbianGradient)"
    />
    <rect width="100%" height="100%" fill="url(#blend)" opacity="0.25" />
    <rect
        x="0"
        y="0"
        width="100%"
        height="100%"
        fill="url(#FocusVignette)"
        opacity="0.9"
    />


    <rect width="100%" height="100%" fill="url(#AvatarGlow)" />
</svg>