<svg version="1.1"
    width="500" height="300"
    xmlns="http://www.w3.org/2000/svg">
    <title>unified transbian flag</title>
    <defs>
        <linearGradient id="blend" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="DeepSkyBlue" />
            <stop offset="50%" stop-color="White" />
            <stop offset="100%" stop-color="HotPink" />
        </linearGradient>
    </defs>
    <rect width="100%" height="50" y="0" fill="DeepSkyBlue" />
    <rect width="100%" height="50" y="50" fill="HotPink" />
    <rect width="100%" height="50" y="100" fill="#FF9A56" />
    <rect width="100%" height="50" y="150" fill="White" />
    <rect width="100%" height="50" y="200" fill="PaleVioletRed" />
    <rect width="100%" height="50" y="250" fill="MediumVioletRed" />
    <rect width="100%" height="100%" fill="url(#blend)" opacity="0.33" />
</svg>